name: Monthly RBI Data Sync Pipeline

on:
  schedule:
    # Runs at midnight on the 1st of every month
    - cron: '0 0 1 * *'
  workflow_dispatch: # Allows manual trigger execution testing via GitHub UI

permissions:
  contents: write

jobs:
  run-pipeline-automation:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Configure Python Infrastructure Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Pinned Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Extraction Scraper Pipeline
      run: python scraper.py

    - name: Commit and Push Compiled Data JSON Changes
      run: |
        git config --global user.name "Automated Data Ingestion Action"
        git config --global user.email "actions@github.com"
        git add data.json
        # Only push code if there are actual balance variance updates in the values
        git diff --quiet && git diff --staged --quiet || (git commit -m "System Sync: Compiled latest Monthly RBI Card Data Matrix" && git push)
